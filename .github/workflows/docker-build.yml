name: Docker Build

on:
  schedule:
    - cron: '0 20 * * 6'
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: acreetionos-terminal

jobs:
  build-el9-stable:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image (EL9)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.el9
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:el9-latest
            ${{ env.REGISTRY }}/${{ github.repository }}:el9-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract binary from Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ github.repository }}:el9-latest
          docker create --name extract ${{ env.REGISTRY }}/${{ github.repository }}:el9-latest
          mkdir -p out/el9
          docker cp extract:/acreetionos-terminal out/el9/acreetionos-terminal
          docker rm extract

      - name: Smoke test binary
        run: |
          chmod +x out/el9/acreetionos-terminal
          out/el9/acreetionos-terminal --version

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/el9/acreetionos-terminal
          generate_release_notes: true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: acreetionos-terminal-el9
          path: out/el9/acreetionos-terminal
          retention-days: 90
