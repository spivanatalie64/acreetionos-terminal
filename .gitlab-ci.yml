variables:
  REGISTRY_IMAGE: $CI_REGISTRY_IMAGE

stages:
  - build
  - release

build-el9:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_MERGE_REQUEST_ID'
      when: never
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker buildx create --use
  script:
    - docker buildx build
      --file docker/Dockerfile.el9
      --tag $REGISTRY_IMAGE:el9-latest
      --tag $REGISTRY_IMAGE:el9-$CI_COMMIT_SHORT_SHA
      --cache-from type=gha
      --cache-to type=gha,mode=max
      --push
      .
    - docker buildx build
      --file docker/Dockerfile.el9
      --tag acreetionos-terminal-el9
      --load
      .
    - docker create --name extract acreetionos-terminal-el9
    - mkdir -p out/el9
    - docker cp extract:/acreetionos-terminal out/el9/acreetionos-terminal
    - docker rm extract
  artifacts:
    paths:
      - out/el9/acreetionos-terminal
    expire_in: 90 days

release-el9:
  stage: release
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  before_script:
    - apk add --no-cache release-cli
  script:
    - |
      release-cli create \
        --name "AcreetionOS Terminal $CI_COMMIT_TAG" \
        --tag-name $CI_COMMIT_TAG \
        --description "Release $CI_COMMIT_TAG — EL9 binary targeting glibc 2.34" \
        --assets-link "{\"name\":\"acreetionos-terminal-el9\",\"url\":\"$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/out/el9/acreetionos-terminal?job=build-el9\"}"
